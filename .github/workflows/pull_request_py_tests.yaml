name: 'Pull request tests'

on: [pull_request]

jobs:
  test:
    name: 'Python tests'

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: 'setup python'
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: 'install fiit'
        run: pip install --editable .[DEV]

      - name: 'run tests'
        run: ./tests/run.sh
